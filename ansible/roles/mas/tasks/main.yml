---
# roles/mas/tasks/main.yml
# Installs App Store apps via mas CLI.
# Prerequisite: Must be signed into App Store (via Apple ID) before running.
# mas 4.0+ requires sudo to install apps.

- name: Check if mas is installed
  command: which mas
  register: mas_which
  ignore_errors: true
  changed_when: false

- name: Download and install mas if not present
  when: mas_which.rc != 0
  block:
    - name: Resolve latest mas download URL via GitHub API
      # mas uses versioned asset names (e.g. mas-6.0.1-arm64.pkg) so
      # releases/latest/download/ doesn't work — query the API instead.
      shell: |
        curl -s https://api.github.com/repos/mas-cli/mas/releases/latest \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        assets = [a for a in data.get('assets', [])
                  if 'arm64' in a['name'] and a['name'].endswith('.pkg')]
        if assets:
            print(assets[0]['browser_download_url'])
        else:
            # Fallback: try any .pkg asset
            pkgs = [a for a in data.get('assets', []) if a['name'].endswith('.pkg')]
            print(pkgs[0]['browser_download_url'] if pkgs else '')
        "
      register: mas_url
      changed_when: false

    - name: Fail clearly if no mas download URL found
      fail:
        msg: >
          Could not resolve mas download URL from GitHub API.
          Check https://github.com/mas-cli/mas/releases and set the URL manually.
      when: mas_url.stdout == ""

    - name: Download mas pkg
      get_url:
        url: "{{ mas_url.stdout }}"
        dest: /tmp/mas.pkg
        mode: '0644'

    - name: Install mas
      become: true
      command: installer -pkg /tmp/mas.pkg -target /

    - name: Clean up mas installer
      file:
        path: /tmp/mas.pkg
        state: absent

  rescue:
    - name: Warn that mas install failed
      debug:
        msg: >
          WARNING: mas install failed. App Store apps will be skipped.
          Install mas manually: https://github.com/mas-cli/mas/releases/latest

- name: Resolve mas binary path
  command: which mas
  register: mas_bin
  changed_when: false
  ignore_errors: true

- name: Warn if mas not found after install attempt
  debug:
    msg: "WARNING: mas binary not found. App Store installs will be skipped."
  when: mas_bin.rc != 0

- name: Check App Store signin status
  command: "{{ mas_bin.stdout }} account"
  register: mas_account
  ignore_errors: true
  changed_when: false
  when: mas_bin.rc == 0

- name: Warn if not signed into App Store
  debug:
    msg: >
      WARNING: Not signed into App Store. App Store installs will be skipped.
      Sign in via System Settings > Apple ID and re-run: --tags mas
  when: mas_bin.rc == 0 and mas_account.rc != 0

- name: Install App Store apps
  become: true
  command: "{{ mas_bin.stdout }} install {{ item.id }}"
  loop: "{{ mas_apps }}"
  when: mas_bin.rc == 0 and mas_account.rc == 0
  register: mas_result
  changed_when: >
    'already installed' not in (mas_result.stdout | default('')) and
    'already installed' not in (mas_result.stderr | default(''))
  ignore_errors: true